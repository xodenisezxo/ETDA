<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PortFam - ดู Demo</title>
  <link rel="stylesheet" href="demo-login.css" />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Thai:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body>
  <header class="site-header">
    <div class="container nav">
      <a href="index.html" class="brand">
        <div class="brand-logo">PF</div>
        <div class="brand-text">PortFam</div>
      </a>

      <button class="menu-toggle" id="menuToggle" type="button" aria-label="เปิดเมนู" aria-expanded="false" aria-controls="mobileMenu">
        <span></span>
        <span></span>
        <span></span>
      </button>

      <nav class="menu" id="mobileMenu">
        <a href="index.html">หน้าแรก</a>
        <a href="recom.html">คำแนะนำ</a>
        <a href="youth-guide.html">สำหรับเยาวชน</a>
        <a href="parent-guide.html">สำหรับผู้ปกครอง</a>
        <a href="demo-login.html" class="active-link">ดู Demo</a>
      </nav>
    </div>
  </header>

  <main class="page-wrap">
    <section class="demo-section">
      <div class="container">
        <div class="demo-layout">
          <div class="demo-stage">
            <div class="phone-mockup">
              <div class="phone-notch"></div>

              <div class="phone-screen">
                <div class="scene scene-active" data-scene="1">
                  <div class="screen-icon blue-circle">PF</div>
                  <h2>เริ่มต้นใช้งาน</h2>
                  <p>สร้างบัญชี PortFam เพื่อเริ่มต้นอย่างปลอดภัย</p>
                </div>

                <div class="scene" data-scene="2">
                  <div class="screen-icon thaid-circle">
                    Thai<span>D</span>
                  </div>
                  <h2>ยืนยันตัวตน</h2>
                  <p>ผ่านระบบ ThaiID ของรัฐ</p>
                </div>

                <div class="scene" data-scene="3">
                  <div class="screen-icon consent-circle">👨‍👩‍👧</div>
                  <h2>ผู้ปกครองยินยอม</h2>
                  <p>ให้ Consent อย่างโปร่งใส</p>
                </div>

                <div class="scene" data-scene="4">
                  <div class="success-check">✓</div>
                  <h2>พร้อมใช้งาน!</h2>
                  <p>บัญชีของคุณปลอดภัยและพร้อมลงทุน</p>
                </div>
              </div>
            </div>
          </div>

          <aside class="step-panel">
            <div class="panel-head">
              <span class="panel-head-icon">🕘</span>
              <h3>ขั้นตอนการทำงาน</h3>
            </div>

            <div class="step-list">
              <button class="step-card active" data-target="1" type="button">
                <div class="step-no">1</div>
                <div class="step-info">
                  <strong>เริ่มใช้งาน</strong>
                  <span>สร้างบัญชี PortFam</span>
                </div>
              </button>

              <button class="step-card" data-target="2" type="button">
                <div class="step-no">2</div>
                <div class="step-info">
                  <strong>ยืนยันตัวตน</strong>
                  <span>ผ่านระบบ ThaiID ของรัฐ</span>
                </div>
              </button>

              <button class="step-card" data-target="3" type="button">
                <div class="step-no">3</div>
                <div class="step-info">
                  <strong>ผู้ปกครองยินยอม</strong>
                  <span>ให้ Consent อย่างโปร่งใส</span>
                </div>
              </button>

              <button class="step-card" data-target="4" type="button">
                <div class="step-no">4</div>
                <div class="step-info">
                  <strong>ใช้งานสำเร็จ</strong>
                  <span>เริ่มลงทุนได้อย่างมั่นใจ</span>
                </div>
              </button>
            </div>
          </aside>
        </div>
      </div>
    </section>
  </main>

  <script src="demo-login.js"></script>
</body>
</html>
